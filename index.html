<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Redireciona para a pasta frontend
        window.location.href = '/software-escalas/frontend/';
    </script>
</head>
<body>
    <div class="loader">
        <h2>Redirecionando para o sistema de escalas...</h2>
        <div class="spinner"></div>
        <p>Se não for redirecionado automaticamente, <a href="/software-escalas/frontend/">clique aqui</a></p>
    </div>
</body>
</html>
